<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Link Bio • @kavve_ra</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔗</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #161412;
      color: #f2ede6;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Hero ─── */
    .hero {
      text-align: center;
      padding: 48px 20px 32px;
      position: relative;
    }
    .hero::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60px;
      height: 3px;
      background: #7c5cfc;
      border-radius: 2px;
    }
    .hero-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: linear-gradient(135deg, #7c5cfc, #4ade80);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
      font-size: 36px;
      box-shadow: 0 0 40px rgba(124, 92, 252, 0.2);
    }
    .hero h1 {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: #f2ede6;
    }
    .hero p {
      font-size: 14px;
      color: #6b6359;
      margin-top: 6px;
      max-width: 300px;
      margin-left: auto;
      margin-right: auto;
    }

    /* ─── Container ─── */
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    /* ─── Section title ─── */
    .section-label {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #4a443e;
      margin-bottom: 16px;
      padding: 0 4px;
    }

    /* ─── Product Cards ─── */
    .link-grid {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .link-empty {
      text-align: center;
      padding: 48px 20px;
      color: #4a443e;
    }
    .link-empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.3;
    }
    .link-empty p {
      font-size: 14px;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      background: #1e1c1a;
      border: 1px solid #2e2a26;
      border-radius: 14px;
      text-decoration: none;
      color: #f2ede6;
      transition: all .25s ease;
      position: relative;
      overflow: hidden;
    }
    .link-card::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: #7c5cfc;
      border-radius: 0 3px 3px 0;
      opacity: 0;
      transition: opacity .25s ease;
    }
    .link-card:hover {
      background: #2a2724;
      border-color: #3d3833;
      transform: translateX(4px);
    }
    .link-card:hover::before {
      opacity: 1;
    }
    .link-card:active {
      transform: translateX(2px) scale(0.99);
    }

    .link-card .card-icon {
      width: 48px;
      height: 48px;
      min-width: 48px;
      border-radius: 10px;
      background: #2a2724;
      border: 1px solid #2e2a26;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .link-card .card-info {
      flex: 1;
      min-width: 0;
    }
    .link-card .card-name {
      font-size: 15px;
      font-weight: 600;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .link-card .card-meta {
      font-size: 12px;
      color: #6b6359;
      margin-top: 3px;
    }
    .link-card .card-arrow {
      color: #4a443e;
      font-size: 18px;
      transition: all .25s ease;
      min-width: 20px;
      text-align: right;
    }
    .link-card:hover .card-arrow {
      color: #7c5cfc;
      transform: translateX(3px);
    }

    /* ─── Footer ─── */
    .footer {
      text-align: center;
      padding: 40px 20px 24px;
    }
    .footer .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 10px 20px;
      border-radius: 9999px;
      background: #1e1c1a;
      border: 1px solid #2e2a26;
      color: #6b6359;
      text-decoration: none;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.5px;
      transition: all .2s ease;
    }
    .footer .back-link:hover {
      background: #2a2724;
      border-color: #3d3833;
      color: #f2ede6;
    }
    .footer .powered {
      font-size: 11px;
      color: #3d3833;
      margin-top: 16px;
    }

    /* ─── Toast ─── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #2a2724;
      border: 1px solid #3d3833;
      padding: 10px 20px;
      border-radius: 9999px;
      font-size: 13px;
      color: #4ade80;
      opacity: 0;
      transition: opacity .3s ease;
      pointer-events: none;
      z-index: 100;
    }
    .toast.show { opacity: 1; }

    /* ─── Shimmer loading ─── */
    .shimmer-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 16px;
      background: #1e1c1a;
      border: 1px solid #2e2a26;
      border-radius: 14px;
    }
    .shimmer-card .shimmer-icon {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      background: linear-gradient(90deg, #2a2724 25%, #34302c 50%, #2a2724 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
    }
    .shimmer-card .shimmer-text {
      flex: 1;
    }
    .shimmer-card .shimmer-line {
      height: 14px;
      border-radius: 4px;
      background: linear-gradient(90deg, #2a2724 25%, #34302c 50%, #2a2724 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      margin-bottom: 6px;
    }
    .shimmer-card .shimmer-line:last-child {
      width: 60%;
      margin-bottom: 0;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @media (max-width: 400px) {
      .hero { padding: 32px 16px 24px; }
      .hero h1 { font-size: 24px; }
      .container { padding: 16px 12px 32px; }
    }
  </style>
</head>
<body>
  <!-- Hero -->
  <div class="hero">
    <div class="hero-avatar">🔗</div>
    <h1>Link Bio</h1>
    <p>Temukan produk rekomendasi dan penawaran menarik</p>
  </div>

  <div class="container">
    <div class="section-label">🛍️ Produk Rekomendasi</div>
    <div class="link-grid" id="linkGrid">
      <!-- Shimmer loading -->
      <div class="shimmer-card">
        <div class="shimmer-icon"></div>
        <div class="shimmer-text">
          <div class="shimmer-line" style="width:80%"></div>
          <div class="shimmer-line" style="width:40%"></div>
        </div>
      </div>
      <div class="shimmer-card">
        <div class="shimmer-icon"></div>
        <div class="shimmer-text">
          <div class="shimmer-line" style="width:75%"></div>
          <div class="shimmer-line" style="width:35%"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer">
    <a class="back-link" href="/">
      <span>←</span>
      <span>Tools Affiliate</span>
    </a>
    <div class="powered">© 2026 @kavve_ra</div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const LB_KEY = 'affiliate_linkbio';
    const grid = document.getElementById('linkGrid');
    const toast = document.getElementById('toast');

    const ICONS = ['🛍️', '✨', '💎', '🎯', '🔥', '⚡', '💫', '🌟', '🎁', '🏷️'];

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function loadEntries() {
      try { return JSON.parse(localStorage.getItem(LB_KEY)) || []; }
      catch { return []; }
    }

    function hashName(name) {
      let hash = 0;
      for (let i = 0; i < name.length; i++) {
        hash = ((hash << 5) - hash) + name.charCodeAt(i);
        hash |= 0;
      }
      return Math.abs(hash);
    }

    function getIcon(name) {
      return ICONS[hashName(name || 'a') % ICONS.length];
    }

    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      const now = new Date();
      const diff = now - d;
      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      if (days === 0) return 'Hari ini';
      if (days === 1) return 'Kemarin';
      if (days < 7) return `${days} hari lalu`;
      return d.toLocaleDateString('id-ID', { day: 'numeric', month: 'short' });
    }

    function render() {
      const entries = loadEntries();

      // Brief shimmer then render
      setTimeout(() => {
        if (entries.length === 0) {
          grid.innerHTML = `
            <div class="link-empty">
              <div class="link-empty-icon">🔗</div>
              <p>Belum ada link tersimpan.<br>Generate caption dulu di Tools Affiliate.</p>
            </div>`;
          return;
        }

        grid.innerHTML = entries.map((e, i) => `
          <a class="link-card" href="${e.link}" target="_blank" rel="noopener noreferrer">
            <div class="card-icon">${getIcon(e.name)}</div>
            <div class="card-info">
              <div class="card-name">${e.name}</div>
              <div class="card-meta">${formatDate(e.addedAt)}</div>
            </div>
            <span class="card-arrow">↗</span>
          </a>
        `).join('');
      }, 400);
    }

    render();
  </script>
</body>
</html>
